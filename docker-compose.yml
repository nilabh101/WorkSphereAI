version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: worksphere-db
    environment:
      POSTGRES_USER: worksphere
      POSTGRES_PASSWORD: password
      POSTGRES_DB: worksphere_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worksphere"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: worksphere-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://worksphere:password@db:5432/worksphere_db
      SECRET_KEY: production-secret-key-changeme
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (Vite)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: worksphere-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
    command: npm run dev -- --host

volumes:
  postgres_data:
